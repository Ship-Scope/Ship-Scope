# Demo mode: read-only instance with pre-loaded sample data
# Usage: docker compose -f docker-compose.demo.yml up -d
#
# No API keys required — this runs ShipScope with realistic sample data
# so users can explore the product without any configuration.

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: shipscope-db-demo
    restart: unless-stopped
    environment:
      POSTGRES_USER: shipscope
      POSTGRES_PASSWORD: demo-password
      POSTGRES_DB: shipscope
    volumes:
      - demo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U shipscope']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - shipscope-demo

  redis:
    image: redis:7-alpine
    container_name: shipscope-redis-demo
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shipscope-demo

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: shipscope-api-demo
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://shipscope:demo-password@postgres:5432/shipscope
      REDIS_URL: redis://redis:6379
      DEMO_MODE: 'true'
      OPENAI_API_KEY: 'sk-demo-not-used'
      API_KEY_HASH_SECRET: demo-hash-secret-not-sensitive
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '4000:4000'
    networks:
      - shipscope-demo
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
      args:
        VITE_API_URL: http://localhost:4000
        VITE_DEMO_MODE: 'true'
    container_name: shipscope-web-demo
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '3000:80'
    networks:
      - shipscope-demo
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'

volumes:
  demo_postgres_data:
    driver: local

networks:
  shipscope-demo:
    driver: bridge
