version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: shipscope-db
    environment:
      POSTGRES_USER: shipscope
      POSTGRES_PASSWORD: shipscope
      POSTGRES_DB: shipscope
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shipscope"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shipscope-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: shipscope-api
    environment:
      DATABASE_URL: postgresql://shipscope:shipscope@postgres:5432/shipscope
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: 4000
    env_file:
      - .env
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    container_name: shipscope-web
    environment:
      VITE_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
