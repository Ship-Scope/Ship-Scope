services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: shipscope-db-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shipscope}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-shipscope}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-shipscope}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - shipscope-net

  redis:
    image: redis:7-alpine
    container_name: shipscope-redis-prod
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shipscope-net

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: shipscope-api-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-shipscope}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-shipscope}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      API_KEY_HASH_SECRET: ${API_KEY_HASH_SECRET:-default-dev-secret}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '${API_PORT:-4000}:4000'
    networks:
      - shipscope-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    container_name: shipscope-web-prod
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '${WEB_PORT:-3000}:80'
    networks:
      - shipscope-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  shipscope-net:
    driver: bridge
